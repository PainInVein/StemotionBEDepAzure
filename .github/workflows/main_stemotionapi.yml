name: Build and deploy .NET 8 API to Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: stemotionapi
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: STEMotion.Presentation/STEMotion.Presentation.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish the correct project
      run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish-output --no-restore

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  # ← must exist from earlier steps
        package: ./publish-output
